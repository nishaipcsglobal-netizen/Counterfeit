{% extends "base.html" %}
{% block title %}Register · BlockVerify{% endblock %}
{% block content %}
  <section class="card" style="margin-top:18px; max-width:620px">
    <div class="hd">
      <div>
        <h2>Register</h2>
        <p>Create Customer or Manufacturer account.</p>
      </div>
    </div>
    <div class="bd">
      {% if error %}<div class="alert">{{ error }}</div>{% endif %}
      <form method="post">
        {% csrf_token %}
        <div>
          <label class="hint">User ID</label>
          <input type="text" name="username" required />
        </div>
        <div style="margin-top:12px">
          <label class="hint">Password</label>
          <input type="password" name="password" required />
        </div>
        <div style="margin-top:12px">
          <label class="hint">Role</label>
          <select name="role">
            <option value="customer">Customer</option>
            <option value="manufacturer">Manufacturer</option>
          </select>
        </div>
        <div class="row" style="margin-top:14px">
          <button class="btn primary" type="submit">Create account</button>
          <a class="pill" href="{% url 'login' %}">Back to login</a>
        </div>
      </form>
    </div>
  </section>
{% endblock %}
