<!DOCTYPE html>
<html>
<head>
    <title>Scan Product</title>

    <style>
        body {
            font-family: Arial;
            text-align: center;
            background: #f5f5f5;
        }

        h2 {
            margin-top: 20px;
        }

        #reader {
            margin: 20px auto;
            width: 300px;
        }

        .card {
            width: 300px;
            margin: 20px auto;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0,0,0,0.2);
            display: none;
        }

        .success {
            background: #d4edda;
            color: #155724;
        }

        .fail {
            background: #f8d7da;
            color: #721c24;
        }

        .icon {
            font-size: 40px;
        }
    </style>
</head>
<body>

<h2>📷 Scan Product QR</h2>

<div id="reader"></div>

<div id="resultCard" class="card">
    <div id="icon" class="icon"></div>
    <p><b>Product ID:</b> <span id="pid"></span></p>
    <p><b>Name:</b> <span id="pname"></span></p>
    <p><b>Status:</b> <span id="status"></span></p>
</div>

<script src="https://unpkg.com/html5-qrcode"></script>

<script>
function onScanSuccess(decodedText) {
    document.getElementById("beepSound").play();

    html5QrCode.stop();

    fetch("/verify-api/", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({
            product_id: decodedText
        })
    })
    .then(res => res.json())
    .then(data => {

        let card = document.getElementById("resultCard");
        card.style.display = "block";

        document.getElementById("pid").innerText = decodedText;

        if (data.status === "AUTHENTIC") {

            card.className = "card success";
            document.getElementById("icon").innerText = "✅";
            document.getElementById("status").innerText = "AUTHENTIC";
            document.getElementById("pname").innerText = data.name;

        } else {

            card.className = "card fail";
            document.getElementById("icon").innerText = "❌";
            document.getElementById("status").innerText = "FAKE";
            document.getElementById("pname").innerText = "-";
        }
    });
}

const html5QrCode = new Html5Qrcode("reader");

Html5Qrcode.getCameras().then(devices => {
    if (devices.length > 0) {
        html5QrCode.start(
            { facingMode: "environment" },
            { fps: 10, qrbox: 250 },
            onScanSuccess
        );
    }
});
</script>
<audio id="beepSound" src="/media/beep.mp3"></audio>

</body>
</html>
